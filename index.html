<script>
(function () {

// ==== SECTION: config ====
var LOGICAL_W = 1024, LOGICAL_H = 768;
var FIXED_DT = 1 / 120;
var MAX_STEPS_PER_FRAME = 240;

var PIVOT = { x: 512, y: 300 };
var ARM_LEN = 230;
var ROD_LEN = 90;
// v0.2: 「皿中心120pxで即スナップ」は廃止(統一落下物理)。
// 皿の捕捉は「見た目幅の半分+寛容マージン」の横幅と、皿面付近の高さ帯の通過で判定する
var PLATE_DISH_RX = 78;
var PLATE_DISH_RY = 22;
var PLATE_CATCH_MARGIN = 35;
var PLATE_CATCH_HALF_W = PLATE_DISH_RX + PLATE_CATCH_MARGIN; // 113
var PLATE_CATCH_BAND_OFFSET = 26; // 捕捉判定の基準線 = 皿面中心 - この値
var DRAG_RELEASE_VEL_SCALE = 0.5; // 指の移動速度→初速への引き継ぎ率
var DRAG_RELEASE_VEL_CAP = 400;   // px/s cap
var APPLE_R = 26;
var APPLE_TOUCH_R = 62;
var PLATE_CATCH_BELOW = PLATE_DISH_RY + APPLE_R + 14; // 即着地帯の下限（皿の厚み＋果物半径＋余白）
var GROUND_Y = 700;
var GRAVITY = 1000;
var FOLLOW_RATE = -Math.log(1 - 0.4) * 60; // per-second lerp rate equivalent to 0.4/frame@60fps

var LEFT_ZONE = { x: 70, y: 108, w: 330, h: 172 };
var RIGHT_ZONE = { x: 624, y: 108, w: 330, h: 172 };

// v0.4: 動物を外側へ寄せ、口ゾーン(食べさせ=引き算の捕捉円)を定義する。
// 皿の捕捉帯(catchHalfW)と口ゾーンは水平方向に非重複でなければならない(ハーネスの invariant)。
// 皿は angle∈[-30,30]度で動くが、水平方向にもっとも張り出す(=口ゾーンに最も近づく)のは
// angle=0 のとき(cosが最大になるため)。そこを基準に、口ゾーンをさらに外側へ
// MOUTH_MARGIN ぶん離しておけば、全ての角度で非重複が数学的に保証される
var PLATE_MAX_REACH_L = PIVOT.x - ARM_LEN; // 282: 左皿がもっとも内側(=口に近い側)に来る時のx
var PLATE_MAX_REACH_R = PIVOT.x + ARM_LEN; // 742: 右皿がもっとも内側に来る時のx
var MOUTH_R = 52;
var MOUTH_MARGIN = 40; // 果物半径(26)+余裕。皿捕捉帯の外縁からこの分だけ口ゾーンを離す
var MOUTH_Y_OFFSET = 66; // 動物の頭(口)の位置。動物の基準y からの上方オフセット
var BEAR_POS = { x: PLATE_MAX_REACH_L - PLATE_CATCH_HALF_W - MOUTH_MARGIN - MOUTH_R, y: 660 };
var RABBIT_POS = { x: PLATE_MAX_REACH_R + PLATE_CATCH_HALF_W + MOUTH_MARGIN + MOUTH_R, y: 660 };
var MOUTHS = {
  L: { x: BEAR_POS.x, y: BEAR_POS.y - MOUTH_Y_OFFSET, r: MOUTH_R },
  R: { x: RABBIT_POS.x, y: RABBIT_POS.y - MOUTH_Y_OFFSET, r: MOUTH_R }
};

// v0.2: 無操作ヒント(ゴーストハンド)
var HINT_DELAY_MS = 5000;   // 無操作からヒント表示までのシミュレーション時間
var HINT_CYCLE_MS = 1600;   // 1ループの長さ

// v0.2: テーマバリエーション(果物3種 x 動物ペア3種。セッション開始ごとにゲームRNGで選択)
var FRUIT_LIST = ['apple', 'orange', 'peach'];
var ANIMAL_PAIR_LIST = ['bear-rabbit', 'cat-chick', 'panda-frog'];

// v0.2: BGM(WebAudio合成)。効果音より明確に小さいゲイン
var BGM_GAIN_BASE = 0.12;

// spring-damper tuning: theta'' = k(target-theta) - c*theta'  (degrees)
// zeta = c/(2*sqrt(k)) ~= 0.42 -> underdamped, ~1-2 visible oscillations then settle
var SPRING_K = 90;
var SPRING_C = 8;
var EPS_VEL = 3;      // deg/s
var EPS_ANGLE = 0.6;  // deg
var SETTLE_MS = 1000;
var TRANSITION_MS = 1500;
var LONGPRESS_MS = 2000;
var CORNER_ZONE = { x: 0, y: 0, w: 90, h: 90 };

var MENU_PANEL = { x: 212, y: 170, w: 600, h: 420 };
var MENU_RECTS = {
  bgm: { x: 262, y: 360, w: 500, h: 56 },
  copy: { x: 262, y: 430, w: 220, h: 74 },
  clear: { x: 542, y: 430, w: 220, h: 74 },
  close: { x: 472, y: 526, w: 80, h: 56 }
};

// v0.3: 画面遷移(タイトル/メニュー/ゲーム)。おうちボタンは右上、左上長押しゾーンと対で配置
var HOME_ZONE = { x: LOGICAL_W - 90, y: 0, w: 90, h: 90 };
var HOME_PRESS_MS = 800; // シミュレーション時間で0.8秒押し込み続けるとメニューへ戻る

// v0.4: メニュー画面の絵タイルはてんびん1枚のみ(わけっこ引退)。中央配置
var MENU_TILE_TENBIN = { x: (LOGICAL_W - 340) / 2, y: 190, w: 340, h: 360 };

// v0.4: てんびん自由遊び(ドリル廃止・ラウンド制)。難易度ランプは入れない
var ROUND_FRUITS_MIN = 4, ROUND_FRUITS_MAX = 9;
var ROUND_SCATTER = 0.55;
var ROUND_DOTS_PER_CYCLE = 5; // 進行ドットが5つ満ちたら幕間
var INTERLUDE_MS = 3500;      // 幕間(星5つ+動物手振り)の長さ
var BALANCE_HOLD_MS = 1200;   // 釣り合い祝福の継続判定(シミュレーション時間)
var BALANCE_EPS_ANGLE = 2;    // 度
var BALANCE_EPS_VEL = 3;      // 度/秒
var BELLY_MAX = 3;            // おなか拡大の段階上限(ラウンドでリセット)

// ==== SECTION: rng ====
function mulberry32(seed) {
  var a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
var qs = new URLSearchParams(window.location.search);
var seedParam = qs.get('seed');
var seed = (seedParam !== null && !isNaN(parseInt(seedParam, 10)))
  ? (parseInt(seedParam, 10) >>> 0)
  : ((Date.now() ^ Math.floor(Math.random() * 0xFFFFFFFF)) >>> 0);
var rng = mulberry32(seed);

var tsParam = parseFloat(qs.get('timescale'));
var timescale = (isFinite(tsParam) && tsParam > 0) ? tsParam : 1;

// ==== SECTION: audio ====
var audioCtx = null, masterGain = null, creakOsc = null, creakFilter = null, creakGain = null;
var bgmGain = null;

// v0.2: BGM設定の永続化(tenbin_prefs)。旧データ・欠損は falsy安全に {bgm:true} を補う
var PREFS_KEY = 'tenbin_prefs';
function loadPrefs() {
  try {
    var raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return { bgm: true };
    var parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return { bgm: true };
    return { bgm: parsed.bgm !== false };
  } catch (e) { return { bgm: true }; }
}
var prefs = loadPrefs();
var bgmEnabled = prefs.bgm;
function persistPrefs() {
  try { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); } catch (e) {}
}
function setBgmEnabled(v) {
  bgmEnabled = !!v;
  prefs.bgm = bgmEnabled; // 操作の瞬間に確定・保存
  persistPrefs();
  if (audioCtx) {
    if (bgmEnabled) startBgm(); else stopBgm();
    applyBgmGain();
  }
}
function toggleBgm() { setBgmEnabled(!bgmEnabled); }

function ensureAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
    return;
  }
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0;
    bgmGain.connect(masterGain);
    setupCreak();
    if (bgmEnabled) startBgm();
    applyBgmGain();
  } catch (e) {
    audioCtx = null;
  }
}

function setupCreak() {
  try {
    creakOsc = audioCtx.createOscillator();
    creakOsc.type = 'sawtooth';
    creakOsc.frequency.value = 70;
    creakFilter = audioCtx.createBiquadFilter();
    creakFilter.type = 'lowpass';
    creakFilter.frequency.value = 350;
    creakGain = audioCtx.createGain();
    creakGain.gain.value = 0;
    creakOsc.connect(creakFilter);
    creakFilter.connect(creakGain);
    creakGain.connect(masterGain);
    creakOsc.start();
  } catch (e) {}
}

function updateCreak(angVelDegPerSec) {
  if (!audioCtx || !creakGain) return;
  try {
    var mag = Math.min(1, Math.abs(angVelDegPerSec) / 40);
    var targetGain = mag > 0.05 ? (0.04 + mag * 0.16) : 0;
    var now = audioCtx.currentTime;
    creakGain.gain.setTargetAtTime(targetGain, now, 0.06);
    creakFilter.frequency.setTargetAtTime(300 + mag * 500, now, 0.1);
  } catch (e) {}
}

function playTone(opts) {
  if (!audioCtx) return;
  try {
    var t0 = audioCtx.currentTime + (opts.delay || 0);
    var dur = opts.dur;
    var osc = audioCtx.createOscillator();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(opts.freq, t0);
    if (opts.freqEnd) osc.frequency.linearRampToValueAtTime(opts.freqEnd, t0 + dur);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(opts.vol || 0.3, t0 + Math.min(0.02, dur * 0.3));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(masterGain);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
  } catch (e) {}
}

function playNoiseBurst(dur, vol, freq) {
  if (!audioCtx) return;
  try {
    var bufSize = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
    var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = (audioNoiseRng() * 2 - 1) * (1 - i / bufSize);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = freq || 1800;
    var g = audioCtx.createGain();
    g.gain.value = vol;
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start();
  } catch (e) {}
}

function playPluck() { playTone({ freq: 520, freqEnd: 780, dur: 0.09, type: 'sine', vol: 0.22 }); }
function playPlace() {
  playTone({ freq: 190, freqEnd: 110, dur: 0.16, type: 'sine', vol: 0.32 });
  playNoiseBurst(0.05, 0.12, 900);
}
function playEat() { playNoiseBurst(0.09, 0.28, 1400); }
function playFanfare(rainbow) {
  var notes = rainbow
    ? [523.25, 659.25, 783.99, 987.77, 1174.66, 1567.98]
    : [523.25, 659.25, 783.99, 1046.5];
  for (var i = 0; i < notes.length; i++) {
    playTone({ freq: notes[i], dur: 0.3, type: 'triangle', vol: 0.2, delay: i * 0.11 });
  }
}
// v0.4: 釣り合い祝福(小)の柔らかい短いチャイム。ラウンド完了ファンファーレより明確に控えめ
function playBalanceChime() {
  playTone({ freq: 880, freqEnd: 1046.5, dur: 0.32, type: 'sine', vol: 0.12 });
  playTone({ freq: 1318.5, dur: 0.28, type: 'sine', vol: 0.08, delay: 0.05 });
}

// --- v0.2: BGM(ペンタトニックのアルペジオ + 低いパッド) ---
// ゆらぎはゲームRNGと独立の固定シードRNGを使う(ゲームの配置再現性を壊さない)
var bgmRng = mulberry32(0x5eed);
// 効果音のノイズ源。ゲーム rng を消費すると配置の決定性が壊れるため専用 rng を使う
var audioNoiseRng = mulberry32(0xA0D10);
var BGM_TEMPO_BPM = 76;
var BGM_NOTE_BEAT = 60 / BGM_TEMPO_BPM; // 1音の基本間隔(秒・実時間)
var BGM_SCALE = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4 D4 E4 G4 A4 ペンタトニック
var BGM_PAD_NOTES = [130.81, 196.00]; // C3 + G3(5度)の低いパッド
var bgmSchedulerId = null;
var bgmNextNoteTime = 0;
var padOsc1 = null, padOsc2 = null, padGain = null, padLfo = null, padLfoGain = null;

function scheduleBgmNote(t0) {
  try {
    var freq = BGM_SCALE[Math.floor(bgmRng() * BGM_SCALE.length)];
    var dur = BGM_NOTE_BEAT * (0.7 + bgmRng() * 0.5);
    var osc = audioCtx.createOscillator();
    osc.type = bgmRng() < 0.6 ? 'triangle' : 'sine';
    osc.frequency.value = freq;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(1, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(bgmGain);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  } catch (e) {}
}

function bgmSchedulerTick() {
  if (!audioCtx || !bgmGain) return;
  var lookahead = 0.2; // 実時間ベースの先読みスケジューリング
  while (bgmNextNoteTime < audioCtx.currentTime + lookahead) {
    scheduleBgmNote(bgmNextNoteTime);
    bgmNextNoteTime += BGM_NOTE_BEAT;
  }
}

function startPad() {
  try {
    padOsc1 = audioCtx.createOscillator();
    padOsc1.type = 'sine'; padOsc1.frequency.value = BGM_PAD_NOTES[0];
    padOsc2 = audioCtx.createOscillator();
    padOsc2.type = 'sine'; padOsc2.frequency.value = BGM_PAD_NOTES[1];
    padGain = audioCtx.createGain();
    padGain.gain.value = 0.5;
    padOsc1.connect(padGain); padOsc2.connect(padGain);
    padGain.connect(bgmGain);
    padOsc1.start(); padOsc2.start();
    // ゆっくりした音量のうねり(LFO)
    padLfo = audioCtx.createOscillator();
    padLfo.type = 'sine'; padLfo.frequency.value = 0.08;
    padLfoGain = audioCtx.createGain();
    padLfoGain.gain.value = 0.2;
    padLfo.connect(padLfoGain);
    padLfoGain.connect(padGain.gain);
    padLfo.start();
  } catch (e) {}
}

function stopPad() {
  try { if (padOsc1) padOsc1.stop(); } catch (e) {}
  try { if (padOsc2) padOsc2.stop(); } catch (e) {}
  try { if (padLfo) padLfo.stop(); } catch (e) {}
  padOsc1 = null; padOsc2 = null; padLfo = null; padLfoGain = null; padGain = null;
}

function startBgm() {
  if (!audioCtx || bgmSchedulerId !== null) return;
  bgmNextNoteTime = audioCtx.currentTime + 0.05;
  bgmSchedulerId = setInterval(bgmSchedulerTick, 50);
  startPad();
}

function stopBgm() {
  if (bgmSchedulerId !== null) { clearInterval(bgmSchedulerId); bgmSchedulerId = null; }
  stopPad();
}

// bgmGain の目標値を一元決定: 無効なら0、完了演出中は1/3にダッキング。
// 毎ステップ状態から導出する（phase 遷移との呼び出し順に依存させない）
var bgmGainAppliedTarget = null;
function applyBgmGain() {
  if (!audioCtx || !bgmGain) return;
  var target = bgmEnabled ? (phase === 'celebrate' ? BGM_GAIN_BASE / 3 : BGM_GAIN_BASE) : 0;
  if (target === bgmGainAppliedTarget) return;
  bgmGainAppliedTarget = target;
  try { bgmGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.25); } catch (e) {}
}

// ==== SECTION: entities ====
// canvas / layout
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var dpr = Math.min(window.devicePixelRatio || 1, 2);
var layout = { scale: 1, offsetX: 0, offsetY: 0 };

// mutable game state (module scope)
// v0.4: 画面遷移。screen='title'|'menu'|'game'(わけっこ引退により game は常に「てんびん」)。
// 揮発状態で保存しない(リロードでタイトルから)
var screen = 'title';
var phase = 'play'; // 'play' | 'celebrate' | 'transition' | 'interlude'
var simTimeMs = 0;
var apples = [];
var nextAppleId = 1;
var plateOrder = { L: [], R: [] };
var plates = { L: { x: 0, y: 0 }, R: { x: 0, y: 0 } };
var balance = { angle: 0, vel: 0, target: 0 };
var counts = { left: 0, right: 0 };
var orientationBlocked = false;
var menuOpen = false;
var celebrationType = null;
var settleTimer = 0;
var dragApple = null;
var longPress = null; // {active, x, y, elapsed}
var homePress = null; // v0.3: {active, x, y, elapsed} おうちボタンの押し込みゲージ
var activePointerId = null;
var celebrate = null;
var transitionState = null;
var interludeState = null; // v0.4: 幕間(星5つ+動物手振り)。約3.5秒でplayへ自動復帰
var animalBounce = { L: 0, R: 0 };
var bellyL = 0, bellyR = 0; // v0.4: 食べさせた分のおなかの微小拡大(段階。ラウンドでリセット)
var particles = [];

// v0.4: ラウンド(自由遊び)。操作/判定の瞬間に確定した値だけを保持する。screen!=='game' は null
var round = null;
var totalRoundIndex = 0;
var cycleDots = 0; // 進行ドット(0..5)。5つ満ちたら幕間

// v0.4: 釣り合い祝福(デバウンス付き・何度でも)
var balanceHoldMs = 0;
var balanceLastKey = null;
var balanceArmed = true;

// v0.4: ログはtenbin_logsのみ書く。wakekko_logsはlegacyとして読み取り・コピー・消去のみ対象にする
var LOG_KEYS = { tenbin: 'tenbin_logs', wakekko: 'wakekko_logs' };
var logStorages = { tenbin: loadLogs(LOG_KEYS.tenbin), wakekko: loadLogs(LOG_KEYS.wakekko) };
var session = null;
// v0.2: 無操作ヒント(ゴーストハンド)の基準時刻。ラウンド開始とどこかのタップでリセットする
var lastInteractionSimMs = 0;
var firstTouchSimMs = null; // 当ラウンドで一度でも触れたか(ヒント表示の判定にのみ使う)
// v0.2: セッションのテーマ(果物・動物ペア)。startNewSession() のたびにゲームRNGで選び直す
var theme = { fruit: FRUIT_LIST[0], animals: ANIMAL_PAIR_LIST[0] };

function makeApple(x, y) {
  return {
    id: nextAppleId++,
    x: x, y: y, r: APPLE_R, state: 'field', plate: null,
    dragTargetX: x, dragTargetY: y, scale: 1,
    vx: 0, vy: 0, resting: false,
    plateLocalX: 0, plateLocalY: 0,
    rollFromX: undefined, rollFromY: undefined, rollTargetX: undefined, rollTargetY: undefined,
    moveHistory: null // v0.2: ドラッグ中の指の移動履歴(離した瞬間の初速計算に使用)
  };
}

function appleById(id) {
  for (var i = 0; i < apples.length; i++) if (apples[i].id === id) return apples[i];
  return null;
}

// ==== SECTION: placement ====
function layoutZone(count, zone, scatter) {
  if (count <= 0) return [];
  var cols = Math.max(1, Math.min(count, 4));
  var rows = Math.ceil(count / cols);
  var cellW = zone.w / cols, cellH = zone.h / rows;
  var pts = [];
  for (var i = 0; i < count; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var gx = zone.x + cellW * (col + 0.5);
    var gy = zone.y + cellH * (row + 0.5);
    var jitterX = Math.max(0, cellW / 2 - APPLE_R * 0.6) * scatter;
    var jitterY = Math.max(0, cellH / 2 - APPLE_R * 0.6) * scatter;
    var jx = (rng() * 2 - 1) * jitterX;
    var jy = (rng() * 2 - 1) * jitterY;
    pts.push({ x: gx + jx, y: gy + jy });
  }
  relaxPoints(pts, zone);
  return pts;
}

function relaxPoints(pts, zone) {
  var minDist = APPLE_R * 2 + 6;
  for (var iter = 0; iter < 8; iter++) {
    for (var i = 0; i < pts.length; i++) {
      for (var j = i + 1; j < pts.length; j++) {
        var dx = pts[j].x - pts[i].x, dy = pts[j].y - pts[i].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < 0.001) { d = 0.001; dx = 0.001; dy = 0; }
        if (d < minDist) {
          var push = (minDist - d) / 2;
          var nx = dx / d, ny = dy / d;
          pts[i].x -= nx * push; pts[i].y -= ny * push;
          pts[j].x += nx * push; pts[j].y += ny * push;
        }
      }
    }
    for (var k = 0; k < pts.length; k++) {
      // 右上はおうちボタンのタッチ余白ぶん狭める: 果物のタッチ円(APPLE_TOUCH_R)が
      // HOME_ZONE と重ならないようにし、1タップの作用先を常に一意に保つ
      var maxX = Math.min(zone.x + zone.w - APPLE_R, HOME_ZONE.x - APPLE_TOUCH_R);
      pts[k].x = Math.min(maxX, Math.max(zone.x + APPLE_R, pts[k].x));
      pts[k].y = Math.min(zone.y + zone.h - APPLE_R, Math.max(zone.y + APPLE_R, pts[k].y));
    }
  }
}

// v0.4: ラウンドの果物総数(4〜9・シード乱数)。難易度ランプは入れない
function pickFruitsTotal() {
  return ROUND_FRUITS_MIN + Math.floor(rng() * (ROUND_FRUITS_MAX - ROUND_FRUITS_MIN + 1));
}

// 総数を左右のゾーンへランダムに散らす(左右比は固定しない。偶奇混在)
function makeRoundApples(fruitsTotal) {
  var leftCount = 0, i;
  for (i = 0; i < fruitsTotal; i++) if (rng() < 0.5) leftCount++;
  var rightCount = fruitsTotal - leftCount;
  var leftPos = layoutZone(leftCount, LEFT_ZONE, ROUND_SCATTER);
  var rightPos = layoutZone(rightCount, RIGHT_ZONE, ROUND_SCATTER);
  var list = [];
  for (i = 0; i < leftPos.length; i++) list.push(makeApple(leftPos[i].x, leftPos[i].y));
  for (i = 0; i < rightPos.length; i++) list.push(makeApple(rightPos[i].x, rightPos[i].y));
  return list;
}

// ==== SECTION: rounds ====
// v0.4: ドリル(LEVELS/5問)を廃止し、自由遊びのラウンド制にする。
// 1ラウンド = 場の果物を全部さばく(皿に載せる or 食べさせる)+天秤静止1秒で完了。
// 完了ごとに進行ドットが1つ点灯し、5つ満ちたら幕間を挟んでリセットする(終わりを押し付けない)。
function newRoundState(fruitsTotal) {
  var idx = totalRoundIndex;
  totalRoundIndex++;
  return {
    index: idx,
    fruitsTotal: fruitsTotal,
    fedL: 0, fedR: 0,
    balanceCelebrations: 0,
    dropOutside: 0,
    removedFromPlate: 0,
    startSimMs: simTimeMs,
    recorded: false // finalizeRound/goHome でのログ二重push防止
  };
}

function resetRoundVolatileState() {
  dragApple = null; // 遷移をまたいで旧ラウンドの果物を持ち越さない
  plateOrder = { L: [], R: [] };
  balance.angle = 0; balance.vel = 0; balance.target = 0;
  settleTimer = 0;
  celebrationType = null;
  balanceHoldMs = 0; balanceLastKey = null; balanceArmed = true;
  bellyL = 0; bellyR = 0; // おなかの拡大はラウンドでリセット
  firstTouchSimMs = null;
  lastInteractionSimMs = simTimeMs; // 無操作ヒントの基準時刻もこの瞬間に確定
}

// ゲーム入場直後・幕間の直後: ロールインなしで即座に次ラウンドを始める
function startRound() {
  resetRoundVolatileState();
  var fruitsTotal = pickFruitsTotal();
  apples = makeRoundApples(fruitsTotal);
  round = newRoundState(fruitsTotal);
  // 導出状態(皿座標)もこの瞬間に確定させる。最初の物理ステップまでの間に
  // 入力・読み取りが来ても未初期化値 (0,0) を晒さない(台帳#1)
  computePlates();
}

// 通常のラウンド間(1.5秒遷移): 果物は画面下からころころ転がり込む簡素なアニメ
function startRoundWithRollIn() {
  resetRoundVolatileState();
  var fruitsTotal = pickFruitsTotal();
  apples = makeRoundApples(fruitsTotal);
  for (var i = 0; i < apples.length; i++) {
    var a = apples[i];
    a.rollTargetX = a.x; a.rollTargetY = a.y;
    a.rollFromX = LOGICAL_W / 2 + (rng() * 2 - 1) * 90;
    a.rollFromY = GROUND_Y + 30;
    a.x = a.rollFromX; a.y = a.rollFromY;
  }
  round = newRoundState(fruitsTotal);
  computePlates();
}

// ラウンド完了条件: 全ての果物が皿の上か食べられたか(拒食も✗もない。進行不能を作らない)
function allResolved() {
  if (apples.length === 0) return false;
  for (var i = 0; i < apples.length; i++) {
    if (apples[i].state !== 'plate' && apples[i].state !== 'eaten') return false;
  }
  return true;
}

// 演出の分岐: 両皿空(全部食べさせた)→'fed' / 同数(>=1個)→'balance'(最上位) / 差あり→重い方
function decideCelebrationType() {
  if (counts.left === 0 && counts.right === 0) return 'fed';
  if (counts.left === counts.right) return 'balance';
  return counts.left > counts.right ? 'left' : 'right';
}

// ログ v2 のラウンドレコードを作る(finalizeRound/goHome の両方から呼ぶ共通経路)
function roundToRecord(r, endedBy, celebType) {
  return {
    fruitsTotal: r.fruitsTotal,
    fedL: r.fedL, fedR: r.fedR,
    balanceCelebrations: r.balanceCelebrations,
    clearedBalanced: endedBy === 'cleared' && celebType === 'balance',
    dropOutside: r.dropOutside,
    removedFromPlate: r.removedFromPlate,
    durationMs: Math.round(simTimeMs - r.startSimMs),
    endedBy: endedBy
  };
}

function finalizeRound() {
  celebrationType = decideCelebrationType();
  var rec = roundToRecord(round, 'cleared', celebrationType);
  round.recorded = true; // goHome が同じラウンドを二重にpushしないための印
  session.rounds.push(rec);
  persistLogsFor('tenbin');
  phase = 'celebrate';
  celebrateInit();
}

function updateRoundSettle(dt) {
  if (!allResolved()) { settleTimer = 0; return; }
  var settled = Math.abs(balance.vel) < EPS_VEL && Math.abs(balance.angle - balance.target) < EPS_ANGLE;
  if (settled) {
    settleTimer += dt * 1000;
    if (settleTimer >= SETTLE_MS) finalizeRound();
  } else {
    settleTimer = 0;
  }
}

// v0.4: 釣り合い祝福(瞬間の応答・何度でも・デバウンス付き)。
// updatePhysics で updateRoundSettle の直後に呼ぶ: 同じティックでラウンドが完了して
// phase が 'play' でなくなっていれば、ここでは発火しない(釣り合い完了が優先)
function updateBalanceCelebration(dt) {
  if (phase !== 'play' || !round) { balanceHoldMs = 0; return; }
  var key = counts.left + ',' + counts.right;
  if (key !== balanceLastKey) {
    balanceLastKey = key;
    balanceArmed = true; // 構成が変わったら再び発火可能にする
    balanceHoldMs = 0;
  }
  var isBalanced = counts.left >= 1 && counts.right >= 1 &&
    Math.abs(balance.angle) <= BALANCE_EPS_ANGLE && Math.abs(balance.vel) <= BALANCE_EPS_VEL;
  if (!isBalanced) { balanceHoldMs = 0; return; }
  balanceHoldMs += dt * 1000;
  if (balanceHoldMs >= BALANCE_HOLD_MS && balanceArmed) {
    balanceArmed = false; // 発火後、この構成が変わるまで再発火しない
    round.balanceCelebrations++; // 発火の瞬間に確定
    spawnBalanceSparkle();
    playBalanceChime();
  }
}

function updateTransition(dt) {
  transitionState.timer += dt * 1000;
  var t = Math.min(1, transitionState.timer / TRANSITION_MS);
  var e = easeInOutQuad(t);
  var i;
  for (i = 0; i < apples.length; i++) {
    var a = apples[i];
    if (a.rollTargetX === undefined) continue;
    a.x = a.rollFromX + (a.rollTargetX - a.rollFromX) * e;
    a.y = a.rollFromY + (a.rollTargetY - a.rollFromY) * e;
  }
  if (transitionState.timer >= TRANSITION_MS) {
    for (i = 0; i < apples.length; i++) {
      if (apples[i].rollTargetX !== undefined) { apples[i].x = apples[i].rollTargetX; apples[i].y = apples[i].rollTargetY; }
    }
    transitionState = null;
    phase = 'play';
  }
}

function updateInterlude(dt) {
  interludeState.timer += dt * 1000;
  if (interludeState.timer >= INTERLUDE_MS) {
    interludeState = null;
    cycleDots = 0; // ドットをリセットして継続(終わりを押し付けない)
    startRound();
    phase = 'play';
  }
}

// ==== SECTION: logging ====
// v0.4: ログはtenbinのみ書く(wakekko_logsはlegacyとして読み取り専用で保持)
function loadLogs(key) {
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    // 破損データ耐性: 非オブジェクト要素は捨て、v2 の数値フィールドは読み込み時に正規化する
    // （文字列数値の混入で統計が文字列連結になるのを防ぐ。監査F3）
    return parsed
      .filter(function (x) { return x && typeof x === 'object' && !Array.isArray(x); })
      .map(function (s) {
        if (s.v === 2 && Array.isArray(s.rounds)) {
          s.rounds = s.rounds
            .filter(function (r) { return r && typeof r === 'object'; })
            .map(function (r) {
              return {
                fruitsTotal: Number(r.fruitsTotal) || 0,
                fedL: Number(r.fedL) || 0,
                fedR: Number(r.fedR) || 0,
                balanceCelebrations: Number(r.balanceCelebrations) || 0,
                clearedBalanced: !!r.clearedBalanced,
                dropOutside: Number(r.dropOutside) || 0,
                removedFromPlate: Number(r.removedFromPlate) || 0,
                durationMs: Number(r.durationMs) || 0,
                endedBy: r.endedBy === 'home' ? 'home' : 'cleared'
              };
            });
        }
        return s;
      });
  } catch (e) { return []; }
}
function persistLogsFor(game) {
  try { localStorage.setItem(LOG_KEYS[game], JSON.stringify(logStorages[game])); } catch (e) {}
}
function chooseTheme() {
  // ゲームRNGから選択(同?seedなら決定的)
  theme = {
    fruit: FRUIT_LIST[Math.floor(rng() * FRUIT_LIST.length)],
    animals: ANIMAL_PAIR_LIST[Math.floor(rng() * ANIMAL_PAIR_LIST.length)]
  };
}
// v0.4: ログ v2。セッションレコードは enterGame の瞬間に確定push・persist
function startNewSession() {
  chooseTheme();
  session = { sessionStart: new Date().toISOString(), game: 'tenbin', v: 2, rounds: [] };
  logStorages.tenbin.push(session);
  persistLogsFor('tenbin');
}

// ==== SECTION: physics ====
function computePlates() {
  var rad = balance.angle * Math.PI / 180;
  var cos = Math.cos(rad), sin = Math.sin(rad);
  var lex = PIVOT.x + (-ARM_LEN * cos);
  var ley = PIVOT.y + (-ARM_LEN * sin);
  var rex = PIVOT.x + (ARM_LEN * cos);
  var rey = PIVOT.y + (ARM_LEN * sin);
  plates.L.x = lex; plates.L.y = ley + ROD_LEN;
  plates.R.x = rex; plates.R.y = rey + ROD_LEN;
  plates._lex = lex; plates._ley = ley; plates._rex = rex; plates._rey = rey;
}

function reflowPlate(side) {
  var order = plateOrder[side];
  for (var idx = 0; idx < order.length; idx++) {
    var a = appleById(order[idx]);
    if (!a) continue;
    var col = idx % 3, row = Math.floor(idx / 3);
    a.plateLocalX = (col - 1) * 36;
    a.plateLocalY = -8 - row * 30;
  }
}

function removeFromPlate(a) {
  var side = a.plate;
  a.plate = null;
  var arr = plateOrder[side];
  if (!arr) return; // 既に皿から外れている（二重解除に耐える）
  var i = arr.indexOf(a.id);
  if (i >= 0) arr.splice(i, 1);
  reflowPlate(side);
}

function snapToPlate(a, side) {
  a.state = 'plate';
  a.plate = side;
  a.scale = 1;
  plateOrder[side].push(a.id);
  reflowPlate(side);
  var impulse = 34 + rng() * 10;
  balance.vel += side === 'R' ? impulse : -impulse;
  playPlace();
}

// v0.4: 口ゾーン(食べさせ=引き算の捕捉域)。果物の実位置基準で判定する。
// 円ではなく「口から足元までの縦カプセル」——体のどこに渡しても食べる
// （足元だけ食べない帯は「拒食に見える応答の空白」になる。監査F2）。
// 水平方向の張り出しは r のまま＝皿捕捉帯との非重複 invariant は不変
var MOUTH_FOOT_Y = 700; // 地面。カプセル下端
function mouthContains(mouth, x, y) {
  var cy = Math.max(mouth.y, Math.min(MOUTH_FOOT_Y, y));
  var dx = x - mouth.x, dy = y - cy;
  return Math.sqrt(dx * dx + dy * dy) <= mouth.r + APPLE_R;
}
function findMouthAt(x, y) {
  if (mouthContains(MOUTHS.L, x, y)) return 'L';
  if (mouthContains(MOUTHS.R, x, y)) return 'R';
  return null;
}
// 食べさせ(引き算)。どんな状態でも拒食しない——皿の上の果物をつまんで放しても食べる。
// fedL/fedR・おなかの拡大は、この操作(捕捉)の瞬間に確定する
function feedApple(a, side) {
  a.state = 'eaten';
  if (side === 'L') { round.fedL++; bellyL = Math.min(BELLY_MAX, bellyL + 1); }
  else { round.fedR++; bellyR = Math.min(BELLY_MAX, bellyR + 1); }
  animalBounce[side] = 320;
  playEat();
}

// v0.2: 落下中、下向き(vy>0)に皿面の高さ帯を毎ステップ跨いだかを判定する。
// 天秤が傾いて皿が動いていても、常に「今の」皿位置(plates.L/R、傾き反映後)で判定する
function tryCatchByPlate(a, prevY) {
  if (a.vy <= 0) return false;
  var sides = ['L', 'R'];
  for (var i = 0; i < sides.length; i++) {
    var side = sides[i];
    var p = plates[side];
    if (Math.abs(a.x - p.x) > PLATE_CATCH_HALF_W) continue;
    var surfaceY = p.y - PLATE_CATCH_BAND_OFFSET;
    if (prevY < surfaceY && a.y >= surfaceY) {
      snapToPlate(a, side);
      return true;
    }
  }
  return false;
}

// v0.4: 落下中の解決順は毎ステップ ①口ゾーン ②皿捕捉帯 ③地面
function updateGroundApple(a, dt) {
  if (a.resting) return;
  var prevY = a.y;
  a.vy += GRAVITY * dt;
  a.x += a.vx * dt;
  a.y += a.vy * dt;
  var mouthSide = findMouthAt(a.x, a.y);
  if (mouthSide) { feedApple(a, mouthSide); return; }
  if (tryCatchByPlate(a, prevY)) return; // 皿に捕捉された(state='plate' に遷移済み)
  if (a.x < APPLE_R + 10) { a.x = APPLE_R + 10; a.vx = -a.vx * 0.4; }
  if (a.x > LOGICAL_W - APPLE_R - 10) { a.x = LOGICAL_W - APPLE_R - 10; a.vx = -a.vx * 0.4; }
  if (a.y >= GROUND_Y) {
    a.y = GROUND_Y;
    if (Math.abs(a.vy) > 30) { a.vy = -a.vy * 0.35; a.vx *= 0.6; }
    else {
      a.vy = 0; a.vx = 0; a.resting = true;
      // dropOutside は「地面静止が確定した瞬間」に一度だけ数える(リリース瞬間ではない)
      round.dropOutside++;
    }
  }
}

function celebrateInit() {
  var eatL = (celebrationType === 'balance' || celebrationType === 'left');
  var eatR = (celebrationType === 'balance' || celebrationType === 'right');
  celebrate = {
    biteTimer: 0, biteInterval: 380, stage: 'biting',
    queueL: eatL ? plateOrder.L.slice() : [],
    queueR: eatR ? plateOrder.R.slice() : [],
    finaleTimer: 0, finaleDone: false
  };
  applyBgmGain(); // 完了演出中は物理音(答え)をマスクしないようBGMをダッキング
}

// celebrate演出専用の自動食べ(完了時に残った皿の果物を演出として食べる)。
// これは子どもの「食べさせ」操作ではないため fedL/fedR は変更しない
function eatApple(id, side) {
  var a = appleById(id);
  // 発火時に前提を再検証: 皿に載っていないりんご（つままれた・処理済み）は食べない
  if (!a || a.state !== 'plate') return;
  a.state = 'eaten';
  playEat();
  animalBounce[side] = 320;
  removeFromPlate(a);
}

function spawnCelebrationParticles() {
  var cx = (plates.L.x + plates.R.x) / 2;
  var cy = Math.min(plates.L.y, plates.R.y) - 40;
  if (celebrationType === 'balance') spawnRainbowParticles(cx, cy, 46);
  else spawnStarParticles(cx, cy, 30);
}

// v0.4: 釣り合い祝福(小)の控えめな虹きらめき。ラウンド完了の演出より明確に粒子少なめ
function spawnBalanceSparkle() {
  var cx = (plates.L.x + plates.R.x) / 2;
  var cy = Math.min(plates.L.y, plates.R.y) - 30;
  spawnRainbowParticles(cx, cy, 10);
}

function updateCelebrate(dt) {
  if (!celebrate) return;
  if (celebrate.stage === 'biting') {
    celebrate.biteTimer += dt * 1000;
    if (celebrate.biteTimer >= celebrate.biteInterval) {
      celebrate.biteTimer = 0;
      var bit = false;
      if (celebrate.queueL.length) { eatApple(celebrate.queueL.shift(), 'L'); bit = true; }
      if (celebrate.queueR.length) { eatApple(celebrate.queueR.shift(), 'R'); bit = true; }
      if (!bit) celebrate.stage = 'finale';
    }
  } else if (celebrate.stage === 'finale') {
    if (!celebrate.finaleDone) {
      celebrate.finaleDone = true;
      spawnCelebrationParticles();
      playFanfare(celebrationType === 'balance');
      // 'fed'(満腹)バリアント: 両動物が揃ってぽんぽんと跳ねる特別な合図
      if (celebrationType === 'fed') { animalBounce.L = 320; animalBounce.R = 320; }
    }
    celebrate.finaleTimer += dt * 1000;
    if (celebrate.finaleTimer >= 1400) celebrate.stage = 'done';
  } else if (celebrate.stage === 'done') {
    advanceAfterCelebration();
  }
}

function advanceAfterCelebration() {
  celebrate = null;
  celebrationType = null;
  applyBgmGain(); // 演出終了でBGM音量を復帰
  cycleDots++;
  if (cycleDots >= ROUND_DOTS_PER_CYCLE) {
    phase = 'interlude';
    interludeState = { timer: 0 };
  } else {
    phase = 'transition';
    transitionState = { timer: 0 };
    startRoundWithRollIn();
  }
}

function updateLongPress(dt) {
  if (longPress && longPress.active) {
    longPress.elapsed += dt * 1000;
    if (longPress.elapsed >= LONGPRESS_MS) {
      menuOpen = true;
      longPress.active = false;
    }
  }
}

// v0.3: おうちボタンの0.8秒押し込み。発火時に前提(screen==='game')は
// inHomeZone 判定時にしか homePress を作らないため、ここでは押し切ったら即 goHome
function updateHomePress(dt) {
  if (homePress && homePress.active) {
    homePress.elapsed += dt * 1000;
    if (homePress.elapsed >= HOME_PRESS_MS) {
      homePress = null;
      goHome();
    }
  }
}

function updatePhysics(dt) {
  counts.left = 0; counts.right = 0;
  for (var i = 0; i < apples.length; i++) {
    if (apples[i].state === 'plate') {
      if (apples[i].plate === 'L') counts.left++; else counts.right++;
    }
  }
  balance.target = Math.max(-30, Math.min(30, (counts.right - counts.left) * 6));
  var accel = SPRING_K * (balance.target - balance.angle) - SPRING_C * balance.vel;
  balance.vel += accel * dt;
  balance.angle += balance.vel * dt;
  computePlates();

  for (i = 0; i < apples.length; i++) {
    var a = apples[i];
    if (a.state === 'drag') {
      var rate = 1 - Math.exp(-FOLLOW_RATE * dt);
      a.x += (a.dragTargetX - a.x) * rate;
      a.y += (a.dragTargetY - a.y) * rate;
    } else if (a.state === 'ground') {
      updateGroundApple(a, dt);
    } else if (a.state === 'plate') {
      a.x = plates[a.plate].x + a.plateLocalX;
      a.y = plates[a.plate].y + a.plateLocalY;
    }
  }

  // 順序が重要: ラウンド完了(updateRoundSettle)を先に評価し、同ティックでphaseが
  // 'play'でなくなったら釣り合い祝福(updateBalanceCelebration)は発火しない
  // (「釣り合ったままラウンド完了」が優先、という演出の序列を構造で保証する)
  if (phase === 'play') { updateRoundSettle(dt); updateBalanceCelebration(dt); }
  else if (phase === 'celebrate') updateCelebrate(dt);
  else if (phase === 'transition') updateTransition(dt);
  else if (phase === 'interlude') updateInterlude(dt);

  if (animalBounce.L > 0) animalBounce.L = Math.max(0, animalBounce.L - dt * 1000);
  if (animalBounce.R > 0) animalBounce.R = Math.max(0, animalBounce.R - dt * 1000);

  updateParticles(dt);
  updateCreak(balance.vel);
}

// ==== SECTION: particles ====
function spawnStarParticles(x, y, count) {
  for (var i = 0; i < count; i++) {
    var ang = rng() * Math.PI * 2;
    var spd = 60 + rng() * 160;
    particles.push({
      shape: 'star', x: x, y: y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 60,
      age: 0, life: 700 + rng() * 500,
      size: 6 + rng() * 8,
      hue: 46 + rng() * 20
    });
  }
}
function spawnRainbowParticles(x, y, count) {
  for (var i = 0; i < count; i++) {
    var ang = (i / count) * Math.PI * 2 + rng() * 0.3;
    var spd = 70 + rng() * 190;
    particles.push({
      shape: 'circle', x: x, y: y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 40,
      age: 0, life: 900 + rng() * 700,
      size: 5 + rng() * 7,
      hue: (i / count) * 360
    });
  }
}
function updateParticles(dt) {
  var out = [];
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.vy += 260 * dt * 0.35;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.age += dt * 1000;
    if (p.age < p.life) out.push(p);
  }
  particles = out;
}

// ==== SECTION: input ====
function logicalFromClient(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left - layout.offsetX) / layout.scale,
    y: (clientY - rect.top - layout.offsetY) / layout.scale
  };
}

function appleWorldPos(a) {
  return { x: a.x, y: a.y };
}

function findDraggableApple(x, y) {
  var best = null, bestD = Infinity;
  for (var i = 0; i < apples.length; i++) {
    var a = apples[i];
    if (a.state !== 'field' && a.state !== 'ground' && a.state !== 'plate') continue;
    var p = appleWorldPos(a);
    var dx = p.x - x, dy = p.y - y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d <= APPLE_TOUCH_R && d < bestD) { best = a; bestD = d; }
  }
  return best;
}

function inCornerZone(x, y) {
  return x >= CORNER_ZONE.x && x <= CORNER_ZONE.x + CORNER_ZONE.w &&
         y >= CORNER_ZONE.y && y <= CORNER_ZONE.y + CORNER_ZONE.h;
}

// v0.3: おうちボタンの押し込み判定領域(右上。左上の隅長押しゾーンと対)
function inHomeZone(x, y) {
  return x >= HOME_ZONE.x && x <= HOME_ZONE.x + HOME_ZONE.w &&
         y >= HOME_ZONE.y && y <= HOME_ZONE.y + HOME_ZONE.h;
}

function startDragApple(a, x, y) {
  if (a.state === 'plate') {
    removeFromPlate(a);
    round.removedFromPlate++;
  }
  a.state = 'drag';
  a.dragTargetX = x; a.dragTargetY = y;
  a.scale = 1.15;
  a.moveHistory = [{ t: simTimeMs, x: x, y: y }]; // v0.2: 初速計算用にドラッグ開始点から記録し直す
  playPluck();
  dragApple = a;
  if (firstTouchSimMs === null) firstTouchSimMs = simTimeMs;
}

// v0.2: ドラッグ中の指の移動履歴から離した瞬間の速度を推定する(直近数サンプルの平均的な傾き)
var DRAG_HISTORY_MAX = 6;
function recordDragHistory(a, x, y) {
  if (!a.moveHistory) a.moveHistory = [];
  a.moveHistory.push({ t: simTimeMs, x: x, y: y });
  if (a.moveHistory.length > DRAG_HISTORY_MAX) a.moveHistory.shift();
}
function computeDragVelocity(a) {
  var hist = a.moveHistory;
  if (!hist || hist.length < 2) return { vx: 0, vy: 0 };
  var first = hist[0], last = hist[hist.length - 1];
  var dt = (last.t - first.t) / 1000;
  if (dt <= 0.001) return { vx: 0, vy: 0 };
  return { vx: (last.x - first.x) / dt, vy: (last.y - first.y) / dt };
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// リリース位置が既に皿面帯に重なっている(=皿に重ねて放した)場合のみ即着地扱い。
// 帯には下限がある——皿より下の空間・地面は皿ではない（動物に放す・地面の果物を
// タップした操作が皿へワープしてはならない。世界律の一貫性）
function findOverlappingPlateAtRelease(x, y) {
  var sides = ['L', 'R'];
  var best = null, bestD = Infinity;
  for (var i = 0; i < sides.length; i++) {
    var side = sides[i];
    var p = plates[side];
    var dx = Math.abs(x - p.x);
    if (dx > PLATE_CATCH_HALF_W) continue;
    if (y < p.y - PLATE_CATCH_BAND_OFFSET) continue; // まだ皿面より上 → 通常どおり落下させる
    if (y > p.y + PLATE_CATCH_BELOW) continue;       // 皿より下 → 皿ではない。落下させる
    if (dx < bestD) { bestD = dx; best = side; }
  }
  return best;
}

// v0.4: リリース解決順は ①口ゾーン(食べさせ) ②皿の重なり帯(即着地) ③落下体。
// 皿に重ねて放した場合以外は ground 状態にして毎ステップの解決(mouth→plate→ground)に委ねる
function releaseDragApple(x, y) {
  var a = dragApple;
  if (!a) return;
  var v = computeDragVelocity(a);
  a.scale = 1;
  a.moveHistory = null;
  dragApple = null;
  // 判定は果物の実位置（lerp 追従後）で行う。ポインタと実体の乖離で
  // 「見えている場所と違う場所に作用する」を作らない
  var mouthSide = findMouthAt(a.x, a.y);
  if (mouthSide) { feedApple(a, mouthSide); return; }
  var plateSide = findOverlappingPlateAtRelease(a.x, a.y);
  if (plateSide) { snapToPlate(a, plateSide); return; }
  a.state = 'ground';
  a.resting = false;
  a.vx = clamp(v.vx * DRAG_RELEASE_VEL_SCALE, -DRAG_RELEASE_VEL_CAP, DRAG_RELEASE_VEL_CAP);
  a.vy = clamp(v.vy * DRAG_RELEASE_VEL_SCALE, -DRAG_RELEASE_VEL_CAP, DRAG_RELEASE_VEL_CAP);
}

function menuPointerDown(x, y) {
  function hit(r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  if (hit(MENU_RECTS.bgm)) { toggleBgm(); return; }
  if (hit(MENU_RECTS.copy)) { copyLogsToClipboard(); return; }
  if (hit(MENU_RECTS.clear)) { clearLogs(); return; }
  if (hit(MENU_RECTS.close)) { menuOpen = false; return; }
  var inPanel = x >= MENU_PANEL.x && x <= MENU_PANEL.x + MENU_PANEL.w &&
                y >= MENU_PANEL.y && y <= MENU_PANEL.y + MENU_PANEL.h;
  if (!inPanel) menuOpen = false;
}

// v0.4: メニュー画面(絵タイル1枚。わけっこ引退)のタップ処理。タイル外のタップは何もしない
function menuScreenPointerDown(x, y) {
  function hit(r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  if (hit(MENU_TILE_TENBIN)) { enterGame(); return; }
}

// v0.4: ゲーム入場(セッション開始はこの瞬間に確定。title/menu中はセッションなし)
function enterGame() {
  screen = 'game';
  totalRoundIndex = 0;
  cycleDots = 0;
  startNewSession();
  startRound();
  phase = 'play';
}

// v0.4: おうちボタンでの離脱。進行中のドラッグ・演出・タイマーを確実にリセットし、
// 前回入場時の状態が次回に漏れないようにする。進行中(未記録)のラウンドがあれば
// endedBy:'home' で確定push、セッションにも endedBy:'home' を書いて同期的にpersistする
function goHome() {
  // 未着手ラウンド（ロールイン直後など、何の操作痕もない）は記録しない——
  // 統計のラウンド数を実プレイから乖離させない（監査F1）
  var touched = round && (round.fedL + round.fedR + round.dropOutside + round.removedFromPlate +
    round.balanceCelebrations + counts.left + counts.right > 0);
  if (round && !round.recorded && session && touched) {
    session.rounds.push(roundToRecord(round, 'home', null));
    round.recorded = true;
  }
  if (session) {
    session.endedBy = 'home';
    persistLogsFor('tenbin');
  }
  screen = 'menu';
  session = null;
  round = null;
  dragApple = null;
  longPress = null;
  homePress = null;
  celebrate = null;
  celebrationType = null;
  transitionState = null;
  interludeState = null;
  settleTimer = 0;
  balanceHoldMs = 0; balanceLastKey = null; balanceArmed = true;
  // 演出状態を画面外へ漏らさない: phase は BGM ダッキングの導出元、
  // particles/animalBounce はメニュー滞在中に凍結して次の入場直後に再生されてしまう(台帳#12)
  phase = 'play';
  particles = [];
  animalBounce.L = 0;
  animalBounce.R = 0;
  bellyL = 0; bellyR = 0;
  cycleDots = 0;
}

function handlePointerDown(x, y) {
  ensureAudio();
  lastInteractionSimMs = simTimeMs; // v0.2: どこをタップしても無操作ヒントのタイマーは即リセット
  if (menuOpen) { menuPointerDown(x, y); return; }
  if (orientationBlocked) return;
  // 隅の長押しはりんごより優先（判定円の重なりで作用先が曖昧にならないように）
  if (inCornerZone(x, y)) { longPress = { active: true, x: x, y: y, elapsed: 0 }; return; }
  if (screen === 'game' && inHomeZone(x, y)) { homePress = { active: true, x: x, y: y, elapsed: 0 }; return; }
  if (screen === 'title') { screen = 'menu'; return; }
  if (screen === 'menu') { menuScreenPointerDown(x, y); return; }
  // screen === 'game'
  // 演出・遷移・幕間中はドラッグ開始不可（食べキュー・ラウンド差し替えと競合させない）
  if (phase !== 'play') return;
  var a = findDraggableApple(x, y);
  if (a) { startDragApple(a, x, y); }
}
function handlePointerMove(x, y) {
  if (dragApple) {
    dragApple.dragTargetX = x; dragApple.dragTargetY = y;
    recordDragHistory(dragApple, x, y);
    return;
  }
  if (longPress && longPress.active) {
    if (Math.hypot(x - longPress.x, y - longPress.y) > 24) longPress.active = false;
  }
  if (homePress && homePress.active) {
    if (Math.hypot(x - homePress.x, y - homePress.y) > 24) homePress.active = false;
  }
}
function handlePointerUp(x, y) {
  if (dragApple) { releaseDragApple(x, y); }
  longPress = null;
  homePress = null; // 指を離すとゲージはリセット
}

// v0.2: 無操作ヒント(ゴーストハンド)。純粋にsimTimeMsから導出する値で、
// 別に進行するタイマー状態を持たない(遅延実行の前提再検証を毎回自動で行う形にする)
function firstFieldApple() {
  for (var i = 0; i < apples.length; i++) if (apples[i].state === 'field') return apples[i];
  return null;
}
function isHintActive() {
  return screen === 'game' && phase === 'play' && !menuOpen && !orientationBlocked &&
    firstTouchSimMs === null &&
    (simTimeMs - lastInteractionSimMs) >= HINT_DELAY_MS;
}
// ヒントの誘導先の皿(近い方)。「りんご→皿」の動詞を非言語デモする
function hintTargetPlate(apple) {
  var dL = Math.hypot(apple.x - plates.L.x, apple.y - plates.L.y);
  var dR = Math.hypot(apple.x - plates.R.x, apple.y - plates.R.y);
  return dL <= dR ? plates.L : plates.R;
}

function bindInput() {
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    if (activePointerId !== null) return;
    var t = e.changedTouches[0];
    activePointerId = t.identifier;
    var p = logicalFromClient(t.clientX, t.clientY);
    handlePointerDown(p.x, p.y);
  }, { passive: false });
  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier === activePointerId) {
        var p = logicalFromClient(t.clientX, t.clientY);
        handlePointerMove(p.x, p.y);
      }
    }
  }, { passive: false });
  function touchEnd(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier === activePointerId) {
        // 先に解放してからハンドラを呼ぶ（ハンドラ例外で入力が永久ロックしない）
        activePointerId = null;
        var p = logicalFromClient(t.clientX, t.clientY);
        handlePointerUp(p.x, p.y);
      }
    }
  }
  canvas.addEventListener('touchend', touchEnd, { passive: false });
  canvas.addEventListener('touchcancel', touchEnd, { passive: false });

  canvas.addEventListener('mousedown', function (e) {
    if (activePointerId !== null) return;
    activePointerId = 'mouse';
    var p = logicalFromClient(e.clientX, e.clientY);
    handlePointerDown(p.x, p.y);
  });
  window.addEventListener('mousemove', function (e) {
    if (activePointerId !== 'mouse') return;
    var p = logicalFromClient(e.clientX, e.clientY);
    handlePointerMove(p.x, p.y);
  });
  window.addEventListener('mouseup', function (e) {
    if (activePointerId !== 'mouse') return;
    activePointerId = null; // 先に解放（ハンドラ例外で入力が永久ロックしない）
    var p = logicalFromClient(e.clientX, e.clientY);
    handlePointerUp(p.x, p.y);
  });
  canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });
}

// ==== SECTION: menu ====
var menuFlash = { copy: 0, clear: 0 };

function copyLogsToClipboard() {
  var text = JSON.stringify({ tenbin: logStorages.tenbin, wakekko: logStorages.wakekko });
  function ok() { menuFlash.copy = 900; }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, function () { fallbackCopy(text, ok); });
    } else {
      fallbackCopy(text, ok);
    }
  } catch (e) {
    fallbackCopy(text, ok);
  }
}
function fallbackCopy(text, ok) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    ok();
  } catch (e) {}
}
function clearLogs() {
  // 消去は消去だけ行う。進行中の session はストレージから切り離されたまま続行し、
  // 以後の persistLogsFor() で復活しない（次の startNewSession から記録再開）。両ゲームとも消す
  logStorages.tenbin = [];
  logStorages.wakekko = [];
  persistLogsFor('tenbin');
  persistLogsFor('wakekko');
  menuFlash.clear = 900;
}

// v0.4: 統計はtenbin_logsのみ表示(わけっこ引退)。v2(rounds配列)を集計し、
// 旧形式(problems形式・v無し)はセッション数のみに数える(欠損安全)
function computeStatsFor(game) {
  var arr = logStorages[game];
  var sessions = arr.length;
  var rounds = 0, balanceCount = 0, fed = 0;
  for (var i = 0; i < arr.length; i++) {
    var s = arr[i];
    if (!s || typeof s !== 'object') continue;
    if (!Array.isArray(s.rounds)) continue; // 旧形式はセッション数のみに数える
    for (var j = 0; j < s.rounds.length; j++) {
      var r = s.rounds[j];
      if (!r || typeof r !== 'object') continue;
      rounds++;
      balanceCount += r.balanceCelebrations || 0;
      fed += (r.fedL || 0) + (r.fedR || 0);
    }
  }
  return { sessions: sessions, rounds: rounds, balance: balanceCount, fed: fed };
}

// ==== SECTION: render ====
// v0.2: 無操作ヒント(ゴーストハンド)。文字は使わず「場の最初のりんご→近い方の皿」へ
// easeInOutで動く半透明の手をループ表示する。描画のみ・ゲーム状態は一切変えない
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

function drawHintHand(c) {
  if (!isHintActive()) return;
  var apple = firstFieldApple();
  if (!apple) return;
  var target = hintTargetPlate(apple);
  var elapsed = simTimeMs - lastInteractionSimMs - HINT_DELAY_MS;
  var cyclePos = elapsed % HINT_CYCLE_MS;
  if (cyclePos < 0) cyclePos += HINT_CYCLE_MS;
  var p = cyclePos / HINT_CYCLE_MS;
  var move = easeInOutQuad(p);
  var hx = apple.x + (target.x - apple.x) * move;
  var hy = apple.y + (target.y - apple.y) * move;
  var alpha = Math.max(0, Math.sin(p * Math.PI)) * 0.5; // 0.4〜0.55程度でフェードイン・アウト
  if (alpha <= 0.01) return;
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = '#3a3a3a';
  c.beginPath();
  c.ellipse(hx, hy, 30, 24, 0, 0, Math.PI * 2);
  c.fill();
  var fingerOffsets = [-16, -6, 6, 16];
  for (var i = 0; i < fingerOffsets.length; i++) {
    c.beginPath();
    c.ellipse(hx + fingerOffsets[i], hy - 22, 7, 12, 0, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function updateLayout() {
  var w = window.innerWidth, h = window.innerHeight;
  var scale = Math.min(w / LOGICAL_W, h / LOGICAL_H);
  var offsetX = (w - LOGICAL_W * scale) / 2;
  var offsetY = (h - LOGICAL_H * scale) / 2;
  layout.scale = scale; layout.offsetX = offsetX; layout.offsetY = offsetY;
  var bw = Math.round(w * dpr), bh = Math.round(h * dpr);
  if (canvas.width !== bw || canvas.height !== bh) {
    canvas.width = bw; canvas.height = bh;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  }
}

function drawBackground(c) {
  var g = c.createLinearGradient(0, 0, 0, LOGICAL_H);
  g.addColorStop(0, '#bfe7ff');
  g.addColorStop(1, '#fff3d6');
  c.fillStyle = g;
  c.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  c.fillStyle = '#cbe8a8';
  c.fillRect(0, GROUND_Y + 24, LOGICAL_W, LOGICAL_H - GROUND_Y - 24);
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.beginPath(); c.ellipse(150, 90, 60, 22, 0, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.ellipse(230, 100, 40, 16, 0, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.ellipse(860, 70, 70, 24, 0, 0, Math.PI * 2); c.fill();
}

function drawProgressDots(c) {
  var n = ROUND_DOTS_PER_CYCLE;
  var spacing = 30;
  var startX = LOGICAL_W / 2 - ((n - 1) * spacing) / 2;
  for (var i = 0; i < n; i++) {
    var x = startX + i * spacing, y = 26;
    var r = i === cycleDots ? 9 : 7;
    c.beginPath();
    c.arc(x, y, r, 0, Math.PI * 2);
    if (i < cycleDots) { c.fillStyle = '#7fc97f'; c.fill(); }
    else if (i === cycleDots) { c.fillStyle = '#ff9f5a'; c.fill(); }
    else { c.strokeStyle = '#ffffff'; c.lineWidth = 3; c.stroke(); }
  }
}

// v0.2: 果物3種(りんご/みかん/もも)。現セッションのテーマ(theme.fruit)で見た目を切り替える
var FRUIT_STYLES = {
  apple: { hi: '#ff8a7a', lo: '#e0392b', stroke: 'rgba(150,30,20,0.4)' },
  orange: { hi: '#ffc36b', lo: '#f08a1c', stroke: 'rgba(150,80,10,0.4)' },
  peach: { hi: '#ffd7e0', lo: '#f4909f', stroke: 'rgba(170,60,80,0.4)' }
};

function drawFruitShape(c, x, y, r, scale) {
  c.save();
  c.translate(x, y);
  c.scale(scale, scale);
  var style = FRUIT_STYLES[theme.fruit] || FRUIT_STYLES.apple;
  var g = c.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
  g.addColorStop(0, style.hi);
  g.addColorStop(1, style.lo);
  c.beginPath();
  c.arc(0, 2, r, 0, Math.PI * 2);
  c.fillStyle = g;
  c.fill();
  c.strokeStyle = style.stroke;
  c.lineWidth = 1.5;
  c.stroke();
  if (theme.fruit === 'orange') {
    c.fillStyle = '#6b8f3a';
    c.beginPath(); c.arc(0, -r + 2, 3, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'rgba(150,90,20,0.35)';
    for (var i = 0; i < 5; i++) {
      var ang = (i / 5) * Math.PI * 2;
      c.beginPath(); c.arc(Math.cos(ang) * r * 0.5, 2 + Math.sin(ang) * r * 0.5, 1.6, 0, Math.PI * 2); c.fill();
    }
  } else if (theme.fruit === 'peach') {
    c.strokeStyle = 'rgba(190,90,90,0.5)';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(0, 2 - r * 0.85);
    c.quadraticCurveTo(3, 2, 0, 2 + r * 0.85);
    c.stroke();
    c.fillStyle = '#7a9a4a';
    c.beginPath(); c.ellipse(2, -r - 1, 5, 2.6, -0.3, 0, Math.PI * 2); c.fill();
  } else {
    // apple (既定): 茎+葉
    c.fillStyle = '#7a4a25';
    c.fillRect(-2, -r - 4, 4, 8);
    c.beginPath();
    c.ellipse(6, -r - 2, 6, 3.2, -0.5, 0, Math.PI * 2);
    c.fillStyle = '#5faa4e';
    c.fill();
  }
  c.restore();
}

function drawFieldApples(c) {
  for (var i = 0; i < apples.length; i++) {
    var a = apples[i];
    if (a.state === 'field' || a.state === 'ground') drawFruitShape(c, a.x, a.y, a.r, a.scale);
  }
}

function drawDragApple(c) {
  if (!dragApple) return;
  drawFruitShape(c, dragApple.x, dragApple.y, dragApple.r, dragApple.scale);
}

function drawPlateApples(c, side) {
  for (var i = 0; i < apples.length; i++) {
    var a = apples[i];
    if (a.state === 'plate' && a.plate === side) drawFruitShape(c, a.x, a.y, a.r, a.scale);
  }
}

function drawBeamAndPlates(c) {
  // stand
  c.fillStyle = '#8a6a45';
  c.beginPath();
  c.moveTo(PIVOT.x - 14, GROUND_Y);
  c.lineTo(PIVOT.x + 14, GROUND_Y);
  c.lineTo(PIVOT.x + 5, PIVOT.y);
  c.lineTo(PIVOT.x - 5, PIVOT.y);
  c.closePath();
  c.fill();

  var lex = plates._lex, ley = plates._ley, rex = plates._rex, rey = plates._rey;
  // beam
  c.strokeStyle = '#7a5a38';
  c.lineWidth = 10;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(lex, ley);
  c.lineTo(rex, rey);
  c.stroke();
  // pivot cap
  c.beginPath();
  c.arc(PIVOT.x, PIVOT.y, 10, 0, Math.PI * 2);
  c.fillStyle = '#5f462b';
  c.fill();

  // rods
  c.strokeStyle = '#9a9a9a';
  c.lineWidth = 3;
  c.beginPath(); c.moveTo(lex, ley); c.lineTo(plates.L.x, plates.L.y); c.stroke();
  c.beginPath(); c.moveTo(rex, rey); c.lineTo(plates.R.x, plates.R.y); c.stroke();

  drawPlateDish(c, plates.L.x, plates.L.y);
  drawPlateDish(c, plates.R.x, plates.R.y);
  drawPlateApples(c, 'L');
  drawPlateApples(c, 'R');
}

function drawPlateDish(c, x, y) {
  c.beginPath();
  c.ellipse(x, y, PLATE_DISH_RX, PLATE_DISH_RY, 0, 0, Math.PI * 2);
  c.fillStyle = '#dfe7ee';
  c.fill();
  c.strokeStyle = '#aab5c2';
  c.lineWidth = 3;
  c.stroke();
}

var ANIMAL_DRAWERS = {
  'bear-rabbit': { left: drawBear, right: drawRabbit },
  'cat-chick': { left: drawCat, right: drawChick },
  'panda-frog': { left: drawPanda, right: drawFrog }
};

// v0.4: おなかの微小拡大(bellyL/R、段階0..BELLY_MAX)を、動物全体の一様スケールで近似する。
// 個別の絵を描き直さずに済む簡素な実装(過剰な抽象化をしない)
function drawAnimalWithBelly(drawFn, c, x, y, bounce, belly) {
  var scale = 1 + belly * 0.05;
  c.save();
  c.translate(x, y);
  c.scale(scale, scale);
  drawFn(c, 0, 0, bounce);
  c.restore();
}

function drawAnimals(c) {
  var pair = ANIMAL_DRAWERS[theme.animals] || ANIMAL_DRAWERS['bear-rabbit'];
  drawAnimalWithBelly(pair.left, c, BEAR_POS.x, BEAR_POS.y, animalBounce.L, bellyL);
  drawAnimalWithBelly(pair.right, c, RABBIT_POS.x, RABBIT_POS.y, animalBounce.R, bellyR);
}

function drawParticles(c) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = Math.max(0, 1 - p.age / p.life);
    c.save();
    c.globalAlpha = alpha;
    c.translate(p.x, p.y);
    c.fillStyle = 'hsl(' + p.hue + ',85%,60%)';
    if (p.shape === 'star') drawStarPath(c, p.size);
    else { c.beginPath(); c.arc(0, 0, p.size, 0, Math.PI * 2); c.fill(); }
    c.restore();
  }
}
function drawStarPath(c, r) {
  c.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = (Math.PI / 5) * i - Math.PI / 2;
    var rad = i % 2 === 0 ? r : r * 0.45;
    var px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
    if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.closePath();
  c.fill();
}

// v0.4: 幕間(進行ドット5つ点灯後の約3.5秒の一区切り)。星5つ+動物が手を振る。文字なし
function drawInterlude(c) {
  c.save();
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  var cx = LOGICAL_W / 2;
  for (var i = 0; i < ROUND_DOTS_PER_CYCLE; i++) {
    var x = cx + (i - 2) * 90;
    var pulse = 1 + Math.sin(simTimeMs / 300 + i) * 0.12;
    c.save();
    c.translate(x, 160);
    c.scale(pulse, pulse);
    c.fillStyle = '#ffd35a';
    drawStarPath(c, 26);
    c.restore();
  }
  var pair = ANIMAL_DRAWERS[theme.animals] || ANIMAL_DRAWERS['bear-rabbit'];
  pair.left(c, BEAR_POS.x, BEAR_POS.y, 320 * (0.5 + Math.sin(simTimeMs / 260) * 0.5));
  pair.right(c, RABBIT_POS.x, RABBIT_POS.y, 320 * (0.5 + Math.cos(simTimeMs / 260) * 0.5));
  c.restore();
}

function drawTransitionFade(c) {
  var t = transitionState.timer;
  var half = TRANSITION_MS / 2;
  var alpha = t < half ? (t / half) : (1 - (t - half) / half);
  c.save();
  c.globalAlpha = Math.max(0, Math.min(1, alpha));
  c.fillStyle = '#fff8ea';
  c.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  c.restore();
}

function drawRotatePrompt(c) {
  c.save();
  c.fillStyle = 'rgba(20,24,32,0.92)';
  c.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  var cx = LOGICAL_W / 2, cy = LOGICAL_H / 2;
  var wob = Math.sin(simTimeMs / 500) * 0.18;
  c.save();
  c.translate(cx, cy);
  c.rotate(Math.PI / 2 + wob);
  roundRect(c, -50, -80, 100, 160, 16);
  c.fillStyle = '#e8ecf2';
  c.fill();
  c.strokeStyle = '#9aa5b5';
  c.lineWidth = 4;
  c.stroke();
  c.beginPath();
  c.arc(0, 62, 8, 0, Math.PI * 2);
  c.fillStyle = '#9aa5b5';
  c.fill();
  c.restore();
  c.save();
  c.translate(cx + 90, cy - 60);
  c.beginPath();
  c.arc(0, 0, 30, -0.4, Math.PI * 1.3);
  c.strokeStyle = '#f0c86a';
  c.lineWidth = 6;
  c.lineCap = 'round';
  c.stroke();
  c.restore();
  c.restore();
}

// v0.3: タイトルの天秤(装飾。ゲーム物理とは独立にsimTimeMsから揺れを導出)。
// scale を渡すことでメニュー画面の絵タイルにも同じ絵を縮小して使い回す
function drawTitleTenbin(c, cx, cy, scale) {
  scale = scale || 1;
  var wob = Math.sin(simTimeMs / 900) * 10;
  var rad = wob * Math.PI / 180;
  var armLen = 170 * scale, rodLen = 70 * scale;
  var cos = Math.cos(rad), sin = Math.sin(rad);
  var lex = cx - armLen * cos, ley = cy - armLen * sin;
  var rex = cx + armLen * cos, rey = cy + armLen * sin;
  c.save();
  c.fillStyle = '#8a6a45';
  c.beginPath();
  c.moveTo(cx - 12 * scale, cy + 150 * scale);
  c.lineTo(cx + 12 * scale, cy + 150 * scale);
  c.lineTo(cx + 5 * scale, cy);
  c.lineTo(cx - 5 * scale, cy);
  c.closePath();
  c.fill();
  c.strokeStyle = '#7a5a38';
  c.lineWidth = 9 * scale;
  c.lineCap = 'round';
  c.beginPath(); c.moveTo(lex, ley); c.lineTo(rex, rey); c.stroke();
  c.beginPath(); c.arc(cx, cy, 9 * scale, 0, Math.PI * 2); c.fillStyle = '#5f462b'; c.fill();
  c.strokeStyle = '#9a9a9a';
  c.lineWidth = 3 * scale;
  c.beginPath(); c.moveTo(lex, ley); c.lineTo(lex, ley + rodLen); c.stroke();
  c.beginPath(); c.moveTo(rex, rey); c.lineTo(rex, rey + rodLen); c.stroke();
  c.beginPath();
  c.ellipse(lex, ley + rodLen, PLATE_DISH_RX * scale, PLATE_DISH_RY * scale, 0, 0, Math.PI * 2);
  c.fillStyle = '#dfe7ee'; c.fill(); c.strokeStyle = '#aab5c2'; c.lineWidth = 3 * scale; c.stroke();
  c.beginPath();
  c.ellipse(rex, rey + rodLen, PLATE_DISH_RX * scale, PLATE_DISH_RY * scale, 0, 0, Math.PI * 2);
  c.fillStyle = '#dfe7ee'; c.fill(); c.strokeStyle = '#aab5c2'; c.lineWidth = 3 * scale; c.stroke();
  c.restore();
}

// v0.4: タイトル画面。暗めの背景+大きな天秤(主)+「てんびん」ロゴ(従)。
// ゲーム画面(明るい背景)と構図で明確に区別する。どこでもタップ→menu
function drawTitleScreen(c) {
  var g = c.createLinearGradient(0, 0, 0, LOGICAL_H);
  g.addColorStop(0, '#232b3a');
  g.addColorStop(1, '#0c0f16');
  c.fillStyle = g;
  c.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  drawTitleTenbin(c, LOGICAL_W / 2, 300, 1.2);
  c.save();
  c.fillStyle = '#fdf6e3';
  c.font = 'bold 68px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  c.fillText('てんびん', LOGICAL_W / 2, 560);
  c.restore();
}

// v0.4: メニュー画面。絵タイル1枚(てんびん。わけっこ引退)+ラベル文字
function drawMenuTile(c, r) {
  roundRect(c, r.x, r.y, r.w, r.h, 24);
  c.fillStyle = '#fff8ea';
  c.fill();
  c.strokeStyle = '#d8d2c0';
  c.lineWidth = 3;
  c.stroke();
  c.save();
  roundRect(c, r.x, r.y, r.w, r.h, 24);
  c.clip();
  var cx = r.x + r.w / 2, cy = r.y + r.h / 2;
  drawTitleTenbin(c, cx, cy - 40, 0.42);
  c.restore();
  c.save();
  c.fillStyle = '#4a3f2c';
  c.font = 'bold 28px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  c.fillText('てんびん', cx, r.y + r.h - 30);
  c.restore();
}

function drawMenuScreen(c) {
  drawBackground(c);
  drawMenuTile(c, MENU_TILE_TENBIN);
}

// v0.3: おうちボタン(右上)。0.8秒の押し込みゲージを円弧で表す。文字なし
function drawHomeButton(c) {
  var cx = HOME_ZONE.x + HOME_ZONE.w / 2, cy = HOME_ZONE.y + HOME_ZONE.h / 2;
  c.save();
  c.translate(cx, cy);
  c.fillStyle = 'rgba(255,255,255,0.85)';
  c.beginPath(); c.arc(0, 0, 26, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#8a6a45';
  c.beginPath(); c.moveTo(-14, 2); c.lineTo(0, -12); c.lineTo(14, 2); c.closePath(); c.fill();
  c.fillStyle = '#c9a876';
  c.fillRect(-10, 2, 20, 14);
  c.restore();
  var progress = homePress && homePress.active ? Math.min(1, homePress.elapsed / HOME_PRESS_MS) : 0;
  if (progress > 0) {
    c.save();
    c.translate(cx, cy);
    c.beginPath();
    c.arc(0, 0, 32, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
    c.strokeStyle = '#ff9f5a';
    c.lineWidth = 5;
    c.lineCap = 'round';
    c.stroke();
    c.restore();
  }
}

// v0.4: ゲーム画面(てんびんのみ。わけっこ引退)
function drawGameScreen(c) {
  drawBackground(c);
  drawProgressDots(c);
  drawFieldApples(c);
  drawBeamAndPlates(c);
  drawAnimals(c);
  drawDragApple(c);
  drawHintHand(c);
  drawParticles(c);
  drawHomeButton(c);
  if (phase === 'interlude') drawInterlude(c);
  if (phase === 'transition' && transitionState) drawTransitionFade(c);
}

function render() {
  updateLayout();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#10131a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(dpr * layout.scale, 0, 0, dpr * layout.scale, dpr * layout.offsetX, dpr * layout.offsetY);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, LOGICAL_W, LOGICAL_H);
  ctx.clip();

  if (orientationBlocked) {
    drawBackground(ctx);
    drawRotatePrompt(ctx);
  } else if (screen === 'title') {
    drawTitleScreen(ctx);
  } else if (screen === 'menu') {
    drawMenuScreen(ctx);
  } else {
    drawGameScreen(ctx);
  }
  if (menuOpen) drawMenu(ctx);
  ctx.restore();
}

// ==== SECTION: main loop ====
function updateOrientation() {
  orientationBlocked = window.innerWidth < window.innerHeight;
}

function step(dt) {
  simTimeMs += dt * 1000;
  applyBgmGain(); // 状態から毎ステップ導出（phase 遷移との順序に依存させない）
  updateOrientation();
  if (orientationBlocked) { updateCreak(0); return; }
  updateLongPress(dt);
  updateHomePress(dt);
  if (menuOpen) return;
  if (screen === 'game') updatePhysics(dt);
}

var lastRealTime = null;
var accumulator = 0;

function frame(nowMs) {
  // 進行不能への最終防衛線: 例外1つで rAF ループを殺さない。
  // console.error は検証ハーネスが失敗として検出するので、欠陥は隠れない
  try {
    if (lastRealTime === null) lastRealTime = nowMs;
    var realDt = (nowMs - lastRealTime) / 1000;
    lastRealTime = nowMs;
    if (realDt > 0.25) realDt = 0.25;
    accumulator += realDt * timescale;
    var steps = 0;
    while (accumulator >= FIXED_DT && steps < MAX_STEPS_PER_FRAME) {
      step(FIXED_DT);
      accumulator -= FIXED_DT;
      steps++;
    }
    if (steps >= MAX_STEPS_PER_FRAME) accumulator = 0; // discard backlog beyond cap (anti spiral-of-death)
    render();
  } catch (e) {
    try { console.error('frame error: ' + (e && e.message)); } catch (_) {}
    accumulator = 0;
  }
  requestAnimationFrame(frame);
}

// ==== SECTION: test-hooks ====
function toClientPoint(x, y) {
  var rect = canvas.getBoundingClientRect();
  return { x: rect.left + layout.offsetX + x * layout.scale, y: rect.top + layout.offsetY + y * layout.scale };
}

function installTenbinHook() {
  var api = {};
  Object.defineProperties(api, {
    // --- 画面遷移 ---
    screen: { enumerable: true, get: function () { return screen; } },
    game: { enumerable: true, get: function () { return screen === 'game' ? 'tenbin' : null; } },
    menuTiles: {
      enumerable: true, get: function () {
        if (screen !== 'menu') return null;
        return { tenbin: { x: MENU_TILE_TENBIN.x, y: MENU_TILE_TENBIN.y, w: MENU_TILE_TENBIN.w, h: MENU_TILE_TENBIN.h } };
      }
    },
    homeButton: {
      enumerable: true, get: function () {
        if (screen !== 'game') return null;
        return { x: HOME_ZONE.x, y: HOME_ZONE.y, w: HOME_ZONE.w, h: HOME_ZONE.h };
      }
    },
    // --- ゲーム(v0.4: 自由遊び・ラウンド制) ---
    phase: { enumerable: true, get: function () { return phase; } },
    round: {
      enumerable: true, get: function () {
        if (screen !== 'game' || !round) return null;
        return {
          index: round.index,
          fruitsTotal: round.fruitsTotal,
          fedL: round.fedL, fedR: round.fedR,
          balanceCelebrations: round.balanceCelebrations,
          dropOutside: round.dropOutside, removedFromPlate: round.removedFromPlate,
          dots: cycleDots
        };
      }
    },
    apples: {
      enumerable: true, get: function () {
        return apples.map(function (a) {
          return { id: a.id, x: a.x, y: a.y, r: a.r, state: a.state, plate: a.plate };
        });
      }
    },
    plates: {
      enumerable: true, get: function () {
        return { L: { x: plates.L.x, y: plates.L.y }, R: { x: plates.R.x, y: plates.R.y }, catchHalfW: PLATE_CATCH_HALF_W };
      }
    },
    mouths: {
      enumerable: true, get: function () {
        return {
          L: { x: MOUTHS.L.x, y: MOUTHS.L.y, r: MOUTHS.L.r, footY: MOUTH_FOOT_Y },
          R: { x: MOUTHS.R.x, y: MOUTHS.R.y, r: MOUTHS.R.r, footY: MOUTH_FOOT_Y }
        };
      }
    },
    balance: {
      enumerable: true, get: function () {
        if (screen !== 'game') return null;
        return { angle: balance.angle, vel: balance.vel, target: balance.target };
      }
    },
    counts: { enumerable: true, get: function () { return { left: counts.left, right: counts.right }; } },
    orientationBlocked: { enumerable: true, get: function () { return orientationBlocked; } },
    menuOpen: { enumerable: true, get: function () { return menuOpen; } },
    menuRegions: {
      enumerable: true, get: function () {
        if (!menuOpen) return null;
        return {
          bgm: { x: MENU_RECTS.bgm.x, y: MENU_RECTS.bgm.y, w: MENU_RECTS.bgm.w, h: MENU_RECTS.bgm.h },
          copy: { x: MENU_RECTS.copy.x, y: MENU_RECTS.copy.y, w: MENU_RECTS.copy.w, h: MENU_RECTS.copy.h },
          clear: { x: MENU_RECTS.clear.x, y: MENU_RECTS.clear.y, w: MENU_RECTS.clear.w, h: MENU_RECTS.clear.h },
          close: { x: MENU_RECTS.close.x, y: MENU_RECTS.close.y, w: MENU_RECTS.close.w, h: MENU_RECTS.close.h }
        };
      }
    },
    theme: { enumerable: true, get: function () { return { fruit: theme.fruit, animals: theme.animals }; } },
    bgmEnabled: { enumerable: true, get: function () { return bgmEnabled; } },
    hintActive: { enumerable: true, get: function () { return isHintActive(); } },
    celebrationType: { enumerable: true, get: function () { return celebrationType; } },
    session: { enumerable: true, get: function () { return screen === 'game' ? session : null; } },
    toClient: { enumerable: true, value: toClientPoint }
  });
  try {
    Object.defineProperty(window, '__tenbin', { value: api, writable: false, configurable: false, enumerable: true });
  } catch (e) {
    window.__tenbin = api;
  }
}

// ==== SECTION: bootstrap ====
function init() {
  bindInput();
  window.addEventListener('resize', function () { updateLayout(); });
  updateLayout();
  // v0.4: ?game=... (未知の値・旧 'wakekko' 含む)はタイトル/メニューを飛ばしてtenbinへ直接入場する
  var gameParam = qs.get('game');
  if (gameParam !== null) {
    enterGame();
  } else {
    screen = 'title';
  }
  installTenbinHook();
  requestAnimationFrame(frame);
}

init();

})();
</script>
